<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Interactive project launcher showcasing various projects" />
    <meta name="theme-color" content="#0d0d0d" />
    <title>Project Launcher</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="app" class="app-container">

        </div>

    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js" defer></script>
    <script src="config.js" defer></script>
    <script src="sketch.js" defer></script>
  </body>
</html>
